body:
  text: 還寃志小説家𩔖二異聞之屬提要臣等謹案還寃志三卷隋顔之推撰之推有顔氏家訓已著録此書隋志不載唐書藝文志作冤魂志三卷文獻通考作北齊還冤志二卷考宋史藝文志作顔之推還寃志太平廣記所引亦皆稱還寃志與今本合則唐志為傳冩之訛至書中所記上始周宣王杜伯之事不得目以北齊即之推亦始本梁人後終隋代觀陸法言切韻序則開皇之初尚與劉臻等八人同時定韻更不得目以北齊殆因舊本之首題北齊黄門侍郎顔之推撰遂誤以冠於書名上歟觀宋史又載釋庭藻續北齊還冤志一卷則誤稱北齊亦已久矣自梁武以後佛教彌昌士大夫率皈禮能仁盛談因果之推家訓有歸心篇於罪福尤為篤信故此書所述皆釋家報應之説然齊有彭生晉有申生鄭有伯有衛有渾良夫其事並載春秋傳趙氏之大厲趙王如意之蒼犬以及魏其武安之事亦未嘗不載於正史强魂毅魄憑厲氣而為變理固有之尚非天堂地獄幻杳不可稽者比也其文詞亦頗古雅殊異小説之冗濫存為鑑戒固亦無害于義矣陳繼儒嘗刻入秘笈中刋削不完僅存一卷此本乃何鏜漢魏叢書所刻猶為原帙今據以著録焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書還寃志隋顔之推撰晉明帝殺力士含𤣥𤣥謂持刀者曰我頸多筋斫之必令即㫁吾將報汝持刀不能留意遂斫數瘡然始絶尋復見𤣥綘冠朱服赤弓丹矢射之持刀者呼曰含𤣥緩我少時而死瑯琊諸葛覆永嘉年為元眞太守家累悉在揚都唯將長子元崇送職覆於郡病亡元崇年始十九送喪欲還覆門生何法僧貪其資貨與伴共推元崇墮水而死因分其財爾夜元崇母陳氏夢元崇還具敘亡父事及身𬒳殺委曲屍骸流漂怨酷無雙違奉累載一旦長辭銜悲茹恨如何可說歔欷不能自勝又云行速疲極困卧窻下牀上以頭枕窻母視兒眠處足知非虚矣陳氏悲怛驚起把火照兒眠處沾濕猶如人形於是舉家號泣便發聞於時徐森之始除交州徐道立為長史道立即陳氏從姑兒也具疏所夢托二徐檢之二徐道遇諸葛喪船驗其父子亡日如鬼語乃收其行兇二人即皆欵服依法殺之更差人送喪達都晉夏矦𤣥字太初亦當時才望為司馬景王所忌而殺之𤣥宗族為之設祭見𤣥來靈座脫頭置其旁悉取果食酒肉以内頸中既畢還自安言曰吾得訴於上帝矣司馬子元無嗣也尋而景王薨遂無子其弟文王封次子攸為齊繼景王後攸薨攸子因嗣立又被殺及永嘉之亂有巫見帝云家傾覆正由曹爽夏矦𤣥二人之訴怨得申故也漢孫策既定㑹稽引兵迎漢帝時道人于吉在策軍中遇天大旱船路艱澁䇿嘗自出督切軍中人每見將士多在吉所因憤怒曰吾不如吉遂收吉轉置日中令其降雨如不能者便當受誅俄頃之間雲雨滂沛未及移時州澗涌溢時竝來賀吉免其死䇿轉怒恚意竟殺之因是䇿頗愍常每彷彿見吉復出射獵為刺客所傷治療將差引鏡自窺鏡中見吉顧則無之如是再三遂撲鏡大叫瘡皆崩裂須㬰而死魯桓公夫人文姜者齊襄公之妹也桓公與文姜俱朝於齊襄公通其妹焉桓公譴責文姜文姜告襄公襄公怒乃與桓公飲酒桓公出襄公使公子彭生送桓公於車彭生多力乃抵桓公脅桓公薨於車上魯人告於齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡何辭以告於諸侯請以彭生除恥辱也齊人歸罪於彭生而殺之後襄公獵於貝丘有大豕從者曰臣見豕乃彭生也襄公怒曰彭生何敢見乎射之豕乃人立而啼公懼墜於車傷足而還其臣連稱管至甫二人作亂遂殺襄公焉呉王夫差殺其臣公孫聖而不以罪後越伐呉呉敗走謂太宰嚭曰吾前殺臣公孫聖投於餘杭山之下今道當由之吾上畏蒼天下慙於地吾舉足而不進心不忍往子試唱於前若聖猶在當有應嚭乃向餘杭之山呼曰公孫聖聖即從上應曰在三呼而三應呉王大懼仰天嘆曰蒼天蒼天寡人豈可復歸乎呉王死不反晉安定張祚以永和中作涼州刺史因自立為涼王河州刺史張璀士衆强盛祚猜忌之密遣兵進圖璀璀率衆拒祚祚遂為璀所殺璀後數見祚來部從鎧甲舉手指璀云底奴要當截汝頭璀入姑臧立張𤣥靜為涼王自為涼州牧又謀廢𤣥靜而自王事未遂嘗與𤣥靜同車出城西門橋梁牢壯而忽摧折刺史舊事正旦放鳥璀所放出手輒死有鸛來巢廣夏門彈逐不去自往看之守燉煌宋混遣弟澄即於巢所害璀璀臨命語澄曰汝荷婚姻而為反逆皇天后土必當照之我自可死當令汝劇我矣混自為尚書令輔政有疾盡日見璀從屋而下奄入柱中其柱狀若火燒掘土則無所見混因病死澄又然燈油變為血廐中馬一夕無尾二嵗小兒作老公聲呼曰宋混澄斫汝頭又城東水中出火後三年澄為張邕所殺晉西域校尉張傾以怨殺麴儉臨死有恨言後傾夜見白狗自拔劒斫之不中傾便倒地不起左右見儉在旁遂以暴卒宋元嘉中李龍等夜行刼掠於時丹陽陶繼之為秣陵縣令㣲密㝷捕遂擒龍等取龍引一人是太樂伎忘其姓名刼發之夜此伎推同伴往就人宿共奏音聲陶不詳審為作欵列隨例申上及所宿主人士貴賓客並相明證陶知枉濫但以文書已行不欲自為通塞遂并諸刼干人於郡門斬之此伎聲伎精能又殊辨慧將死之日親隣知識看者甚衆伎曰我雖賤𨽻少懐慕善未嘗為非實不作刼陶令已當具知枉見殺害若死無鬼則已有鬼必自陳訴因彈琵琶歌曲而就死衆知其枉莫不殞泣月餘日陶遂夜夢伎來至案前云昔枉見殺實所不忍訴之得理今故取君便入陶口仍落腹中陶即驚寤俄而倒絶狀若風顚良久方醒有時而發輒夭矯頭反著背四日而亡亡後家便貧顇一兒早死餘有一孫窮寒路次宋㤗初元年江州刺史鄧琬立刺史晉安王子勛為帝以作亂初南郡太守張悅得罪鎭歸楊都及湓口琬赦之以為冠軍將軍與共經紀軍事琬前軍𡊮顗既敗張悅懼誅乃稱暴疾伏甲而召鄧琬既至謂之曰卿始此禍而欲賣死少帝乎命斬於牀前并殺其子以琬頭至五年悅寢疾見琬為厲遂死宋齊豫章王蕭嶷亡後忽見形於沈文季曰我病未應死皇太子加膏中十一種藥使我不差湯中復加藥一種使我利不斷吾已先訴許還東邸判此事便懐出青紙文書示文季云與卿少舊為呈主上也俄而失所在文季懼不敢傳少時文惠太子薨魏城陽王元徽初為孝莊帝畫計殺爾朱榮及爾朱兆入洛害孝荘而徽懼走投洛陽令宼祖仁祖仁父叔兄弟三人為刺史皆徽之力也既而爾朱兆購徽萬户侯祖仁遂斬徽送之并匿其金百斤馬五十匹及兆得徽首亦不賞侯兆乃夢徽曰我金二百斤馬百疋在祖仁家卿可取也兆覺曰城陽家本巨富昨令收捕全無金銀此夢或實至曉即令収捕祖仁祖仁又見徽曰足得相報矣祖仁欵列得金百斤馬五十疋兆不信之祖仁私歛戚屬得金三十斤馬三十疋輸兆猶不完數兆乃發怒懸頭於樹以石硾其足鞭捶殺之漢竇嬰字王孫漢孝文帝竇皇后從兄子也封魏其矦為丞相後乃免相及竇皇后崩嬰益疎薄無勢黜不得志與太僕灌夫相引薦交結其歡恨相知之晚乎孝景帝王皇后異父同母弟田蚡為丞相親幸縱横使人就嬰求城南田數頃嬰不與曰老僕雖棄丞相雖貴寧可以勢相奪乎灌夫亦助怒之蚡皆恨之及蚡娶妻王太后詔列矦宗室皆往賀蚡灌夫為人狂酒先嘗以醉忤蚡不肎賀之竇嬰强與俱去灌夫引酒至蚡蚡曰不能滿觴夫因言辭不遜蚡遂怒曰此吾驕灌夫之罪也乃縛夫謂長史曰有詔召宗室而灌夫罵坐不敬奏其在鄉里豪横處夫棄市竇嬰還謂其妻曰終不令灌夫獨死而嬰獨生乃上事具陳灌夫醉飽事不足誅帝召見之嬰與蚡互相言短長帝問朝臣兩人誰是朝臣多言嬰是王太后聞怒而不食曰我在人皆凌藉吾弟我百嵗後當魚肉之及出蚡復為嬰造作惡語用以聞上天子亦以蚡為不直特為太后故論嬰死嬰臨死罵曰若死無知則已有知要不獨死後月餘蚡病一身盡痛若有打擊之者但號呼叩頭謝罪天子使祝鬼者瞻之見竇嬰灌夫共手笞蚡蚡遂死天子亦夢見嬰而謝之晉大將軍王敦枉害刁𤣥亮及敦入石頭夢白犬自天下而噬之既還姑熟遇病白日見刁乗軺車道從吏卒來仰頭瞑目乃入攝録敦敦大怖逃不得脫河間國兵張鹿經曠二人相與諧善晉太元十四年五月五日共升鍾嶺坐於山椒鹿􅒬酒失色拔刀斬曠曠母爾夕夢曠自說為鹿所殺殺屍澗中脫褌覆腹尋覔之時必難可得當令裳飛起以示處也明晨追捕一如所言鹿知事露欲規叛逸出門輒見曠手執雙刀來擬其面遂不得去母具告官鹿以伏辭晉山隂縣令石密先經為御史枉奏殺典客令萬黜宻白日見黜來殺宻遂死晉大司馬桓温功業殊盛負其才力久懷簒逆廢晉帝為海西公而立㑹稽王是為簡文帝太宰武陵王晞性尚武事好犬馬逰獵温常忌之故加罪狀奏免晞及子綜官又逼新蔡王晃使列晞綜及前著作郎殷㳙太宰長史庾清等謀反頻請殺之詔特赦晞父子乃徙新安殺涓涓父浩先為温所廢涓頗有氣尚遂不詣温而與晞遊温乃疑之庾清坐有才望且宗族甚強所以並致極法簡文㝷崩而皇太子立遺詔委政於温依諸葛亮王導舊事温大怨望以為失權僭逼愈甚後謁簡文髙平陵方欲伏見帝在墳前轝衣語温云家國不造委任失所温荅臣不敢臣不敢旣登車為左右說之又問殷涓形狀答以肥短温云向亦見在帝側十餘日便病因此憂懣而死秦姚萇字景茂赤亭羌也父戈仲事石勒石氏既滅萇隨其兄襄與苻永固戰於三原軍敗襄死萇乃䧏永固即受禄位累加爵邑及轉龍驤將軍督梁益州諸軍事永固謂之曰朕昔以龍驤建業此號未曾假人今持山南委卿故特以相授其蒙寵任優隆如此後隨永固子􅀈討慕容泓為泓所敗􅀈獨死之萇遣長史詣永固謝罪永固怒既甚即戮其使萇益恐懼遂奔西州邀聚士卒而自樹置永固頻為慕容沖所敗沖轉侵逼永固又見妖怪屢起遂走五將山萇即遣驍騎將軍呉中圍永固中執永固以送萇即日囚之以求傳國璽及令禪讓永固不從數以叛逆之罪萇遂殺之遂稱帝後又將永固屍鞭撻無數祼剥衣裳薦之以棘掘坎埋之及萇遇疾即夢永固將天官使者鬼兵數百突入營中萇甚悚懼走入後帳宫人逆來刺鬼誤中萇隂鬼即相謂曰正著死所抜去矛刃出血石餘忽然驚寤即患隂腫令醫刺之流血如夢又狂言曰殺陛下者臣兄宸耳非臣萇罪願不賜枉後三日萇死秦李雄既王於蜀其第四子期從叔夀襲期而廢為卭都公㝷復殺之而夀自立夀性素兇狠猜忌僕射蔡射等以正直忤㫖遂誅之無㡬夀病恒見李期蔡射為祟嘔血而死宋髙平金鄉張超與同郡翟願不和願以宋元嘉中為方與令忽為人所殺咸疑是超超後除金鄉縣職解宜還家入山伐林翟兄子銅烏執弓持矢并賫酒醴就山貺之斟酌已畢銅烏曰明府昔害民叔無縁共戴天日引弓射之即死銅烏其夜見超云我不殺汝叔枉見殘害今已上訴故來相訪引刀刺之吐血而死宋下邳張稗者家世冠族末葉衰㣲有孫女姝好美色隣人求聘為妾稗以舊門之後恥而不與隣人憤之乃焚其屋稗遂燒死其息邦先行不知後還亦知情狀而畏隣人之勢又貪其財而不言嫁女與之後經一年邦夢見稗曰汝為兒子逆天不孝棄親就同兇黨捉邦頭以手中桃杖刺之邦因病兩宿嘔血而邦死之日隣人又見稗排門直入張目攘袂曰君恃貴縱惡酷暴之甚枉見殺害我已上訴事獲申雪却後數日令君知之隣人得病尋亦殂没宋世永康人吕慶祖家甚温富嘗使一奴名教子守視墅舍以元嘉中便往案行忽為人所殺族弟無期先大舉慶祖餞咸謂為害無期賫羊酒脯至柩所而呪曰君荼酷如此乃云是我魂而有靈使知其人既還至三更見慶祖來云近教子畦疇不理訐當痛治奴奴遂以斧斫我背將帽塞口因得嚙奴三指悉皆破碎便取刀刺我頸我曳著後門初見殺時諸從行人亦在其中奴今欲叛我已釘其頭著壁言畢而滅無期早旦以告父母潛視奴所住壁果有一把髮以竹釘之又看其指並見破傷録奴詰驗具伏又云汝既反逆何以不叛奴云頭如被繫欲逃不得諸同見者事事相符即焚教子并其二息宋髙祖平桓𤣥後以劉毅為撫軍將軍荆州刺史到州便收牛牧寺僧主云藏桓家兒度為沙彌并殺四道人後夜夢見此僧來云君何以枉見殺貧道貧道已白扵天帝恐君亦不得久因遂得病不食日爾羸痩當發楊都時多有諍競侵凌宰輔宋髙祖因遣人征之毅敗夜單騎突出投牛牧寺僧曰撫軍昔枉殺我師我道人自無報仇之理然何宜來此亡師屢有靈驗云天帝當收撫軍於寺殺之毅便歎叱出寺後崗上大樹自縊而死也漢世何敞為交阯刺史行部到蒼梧郡髙要暮宿鵲奔亭夜猶未半有一女子從樓下出自云妾姓蘇名娥字始珠本廣信縣修里人早失父母又無兄弟夫亦久亡有雜繒百二十疋及婢一人名致富妾孤窮羸弱不能自振欲往旁縣賣繒就同縣人王伯賃車牛一乗直錢萬二千載妾并繒合致富執轡乃以前年四月十日到此亭外於時日暮行人既絶不敢前行因即留止致富暴得腹痛妾往亭長舍乞漿取火亭長龔夀操刀持㦸來至車旁問妾曰夫人從何所來車上何載丈夫安在何故獨行妾應之曰何故問之夀因捉妾臂曰少艾有色寧可相樂耶妾時怖懼不肎聽從夀即以刀刺脅一創立死又殺致富夀掘樓下埋妾并婢取財物去殺牛燒車車杠及牛骨貯亭東空井中妾死痛酷無所告訴故來自歸於明使君敞曰今欲發汝屍骸以何為驗女子曰妾上下皆著白衣青絲履猶未朽也掘之果然敞乃遣吏捕夀栲問具服下廣信縣驗問與娥語同收夀父母兄弟皆繫獄敞表夀殺人於常律不至族誅但夀為惡𨼆宻經年王法所不能得鬼神訴千載無一請皆斬之以助隂殺上報從之漢時有王忳字少林為郿縣令之縣到釐亭亭常有鬼殺人忳宿樓上夜有女子稱欲訴寃無衣自盖忳以衣與之乃進曰妾本涪令妾也欲往之官過此亭宿亭長殺妾大小十餘口埋在樓下奪取衣裳財物亭長今為縣門下㳺徼忳曰當為汝報之勿復妄殺良善耶鬼捉衣而去忳旦收㳺徼詰問即服收同謀十餘人并殺之掘取諸喪歸其家殯葬亭永清寧人謡曰信哉少林世無偶飛被走馬與鬼語飛被走馬别為他事今所不録宋東海徐某甲前妻許氏生一男名鐵臼而許亡某甲改娶陳氏陳氏凶虐志滅鐵臼陳氏産一男生而呪之曰汝若不除鐵臼非吾子也因名之曰鐵杵欲以杵擣鐡臼也於是捶打鐵臼備諸苦毒饑不給食寒不加絮某甲性闇弱又多不在後妻恣意行其暴酷鐵臼竟以凍餓病杖而死時年十六亡後旬餘鬼忽還家登陳牀曰我鐵臼也實無片罪横見殘害我母訴怨於天今得天曹符來取鐵杵當令鐵杵疾病與我遭苦時同將去自有期日我今停此待之聲如生時家人賓客不見其形皆聞其語於是恒在屋梁上住陳氏跪謝搏頰為設奠鬼云不須如此餓我令死豈是一餐所能對謝陳夜中竊語道之鬼厲聲曰何敢道我今當㫁汝屋棟便聞鋸聲屑亦隨落拉然有響如棟實崩舉身走出炳燭照之亦了無異鬼又罵鐡杵曰汝既殺我安坐宅上以為快也當燒汝屋即見火然烟熖大猛内外狼狽俄爾自滅茅茨儼然不見虧損日日罵詈時復歌云桃李花嚴霜落奈何桃李子嚴霜早落已聲甚傷切似是自悼不得長成也於時鐵杵六嵗鬼至便病體痛腸大上氣妨食鬼屢打之處處青黑敢月餘而死鬼便寂然無聞魏司馬宣王功業日隆又誅魏大將軍曹爽簒奪之迹稍彰王陵時為楊州刺史以魏帝制於强臣不堪為主楚王彪年長而有才欲迎立之兖州刺史華歆以陵隂謀白宣王宣王自將中軍討陵掩然卒至陵自知勢窮乃單船出迎宣王宣王送陵還京師陵至城過賈逵廟側陵呼曰賈梁道吾固盡心於魏之社稷惟爾有神知之陵遂飲藥死三族皆誅其年宣王有疾白日見陵來并賈逵為祟因呼字曰彦雲緩我宣王身亦有打處少日遂薨魏支法存者本是胡人生長廣州妙善醫術遂成巨富有八支翕毛㲪作百種形像光彩曜日又有沈香八尺板牀居常芬馥王談為廣州刺史大兒劭之屢求二物法存不與王談囚法存繼殺之而籍没家財焉死後形見於府輒打閣下鼔似若稱冤魂如此經旬月王談得病恒見法存守之少時遂亡劭之至楊都又死宋沮渠蒙遜時有沙門曇摩䜟者慱達多識為蒙遜之所信重魏氏遣李順拜蒙遜為涼王仍求曇摩䜟蒙遜恡而不與摩䜟意欲入魏屢從蒙遜請行蒙遜怒殺之既而左右白日見摩䜟以劒擊蒙遜因疾而死漢時王濟左右嘗於闇中就婢取濟衣物婢欲奸之其人云不敢婢言若不從我我當大叫此人卒不肎婢遂呼云某甲欲奸我濟即令人殺之此人具自陳訴濟猶不信故牽將去顧謂濟曰枉不可受要當訟府君於天後濟乃病忽見此人語之曰前具告實不見理今便應去濟數日卒漢時㳺殷字㓜齊漢世為羽林中郎將先與司𨽻校尉胡軫有隙軫遂誣搆殺之殷死月餘軫得病目精脫但云伏罪伏罪㳺幼齊將鬼來於是遂死晉富陽縣令王範有妾桃英殊有姿色遂與閣下丁豐史華期二人姦通範嘗出行不還帳内都督孫元弼聞丁豐户内有環珮聲覘視見桃英與同𬒳而卧元弼叩户面叱之桃英即起攬裙理鬢躡履還内元弼又見華期帶珮桃英麝香二人懼元弼告之乃共謗元弼與桃英有私範不辨察遂殺元弼有陳超者當時在座勸成元弼罪後範代還超亦出都看範行至赤亭山下値雷雨日暮忽然有人扶超腋徑曳將去入荒澤中電光照見一鬼面甚青黑眼無瞳子曰吾孫元弼也訴怨皇天早見申理連時候汝乃今相遇超叩頭流血鬼曰王範既為事主當先殺之賈景伯孫文度在太山𤣥堂下共定死生名録桃英魂魄亦收在女青亭者是第三地獄名在黄泉下専治女鬼投至天明失鬼所在超至揚都詣範未敢說之便見鬼從外來逕入範帳至夜範始眠忽然大魘連呼不醒家人牽青牛臨範上并加桃人左索向明小蘇十許日而死妾亦暴亡超亦逃走長干寺易姓名為何規後五年三月三日臨水酒酣超云今當不復畏此鬼也低頭便見鬼影已在水中以手撏超鼻血大出可一升許數日而殂晉時張駿據有涼州忌害鎭軍將軍武威郗鑒以其宗族強大而多功也遂諷其主簿魏纂使誣鑒謀反駿逼鑒自殺後三年纂病見鑒在側遂死晉時羊珊字懿彭祖晉世廬陵太守為人剛克粗暴恃國姻親縱恣尢甚睚眦之嫌輒加刑殺征西大將軍庾亮檻送具以狀聞有司奏珊殺郡將吏及民蕳良等二百九十人徒譴一百餘人應棄市依八議請宥中宗詔曰此事古今所未有此而可忍孰不可忍何八議之有可獄所賜命珊兄子賁先尚南郡公主自表解婚詔不許瑯琊孝王妃山氏珊之甥也苦以為請於是司徒王遵啓珊罪不宜恕宜極重法山太妃感動疾陛下罔極之恩宜蒙生全之宥於是下詔下曰山太妃惟此一舅發言摧鯁乃至吐血情慮深重朕丁荼毒受太妃撫育之恩同於慈親若不堪難忍之痛以致頓斃朕亦何顔以寄今便原珊生命以慰太妃渭陽之恩於是除名為民少時疾病恒見蕳良等曰枉豈可受今來相取自申黄泉經宿而死晉時㑹稽孔基勤學有志操馮結族人孔敝敝使其二子以基為師而敝子並凶猥趣尚不同基屢言之於敝此兒常有忿恚敝尋䘮亡服制既除基以宿舊乃賫羊酒往看唁二子猶懷宿怨濳遣奴於路側殺基奴還未之至仍見基來張目攘袂厲聲言曰姦醜小豎人面獸心吾蒙顧存昔敦舊平生有何怨惡候道見害慢天忘父神人不容要當斷汝家種從此之後數數見形無㡬大兒向厠忽便絶倒絡繹往看已墮於地次者尋復病殂兄弟無後晉時庾亮誅陶稱後咸康五年冬節㑹文武數十人忽然悉起向階拜揖庾驚問故並云陶公來陶公是稱父侃也庾亦起迎陶公扶兩人悉是舊怨傳詔左右數十人皆操伏戈陶公謂庾曰老僕舉君自代不圖此恩反戮其孤故來相問陶稱何罪身已得訴於帝矣庾不得一言遂寢疾八年一日死還寃志
