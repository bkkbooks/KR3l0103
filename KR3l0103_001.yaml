body:
  text: 還冤志晉明帝殺力士含玄玄謂持刀者曰我頸多筋斫之必令即斷吾將報汝持刀不能留意遂斫數瘡然始絶尋復見玄綘冠朱服赤弓丹矢射之持刀者呼曰含玄緩我少時而死琅琊諸葛覆永嘉年為元真太守家纍悉在揚都唯長子元崇送職覆於郡病亡元崇年始十九送喪欲還覆門生何法僧貪其資貨與伴共推元崇墮水而死因分其財爾夜元崇母陳氏夢元崇還具敘亡父事及身被殺委曲尸骸流漂怨酷無雙違奉纍載一旦長辭銜悲茹恨如何可説歔欷不能自勝又云行速疲極困臥窗下床上以頭枕窗母視兒眠處足知非虛矣陳氏悲怛驚起把火照兒眠處沾濕猶如人形於是舉家號泣便如問于時徐森之始除交州徐道立為長史道立即陳氏從姑兒也具疏所夢托二徐檢之二徐道遇諸葛喪船驗其父子亡日如鬼語乃收其行凶二人即皆款服依法殺之更差人送喪達都晉夏侯玄字太初亦當時才望為司馬景王所忌而殺之玄宗族為之設祭見玄來靈座脫頭置其旁悉取果食酒肉以內頸中既畢還自安言曰吾得訴于上帝矣司馬子元無嗣也尋而景王薨遂無子其弟文王封次子為齊繼景王後攸薨攸子因嗣立又被殺及永嘉之亂有巫見弟云家傾覆正由曹爽夏侯玄二人得訴怨得申故也漢孫策既定會稽引兵迎漢帝時道人于吉枉策軍中遇天大旱船路艱澀策嘗自出督切軍中人每見將士多枉吉所因憤怒曰吾不如吉遂收吉轉置日中令其降雨如不能者便當受誅俄頃之間雲雨滂沛未及移時州澗涌溢時並來賀吉免其死策轉忿恚意竟殺之因是策頗愍常每倣佛見吉復出射獵為刺客所傷治療將差引鏡自窺鏡中見吉顧則無之如是再三遂撲鏡大叫瘡皆崩裂須臾而死魯桓公夫人文薑者齊襄公之妹也桓公與文薑俱朝于齊襄公通其妹焉桓公譴責文薑文薑告襄公襄公怒乃與桓公飲酒桓公出襄公使公子彭生送桓公于車彭生多力乃抵桓公脅桓公薨于車上魯人告于齊曰寡君畏君之威不敢寧居來修舊好禮成而不反無所歸咎惡何辭以告于諸侯請以彭生除恥辱也齊人歸罪于彭生而殺之後襄公獵于貝丘有大豕從者曰臣見豕乃彭生也襄公怒曰彭生何敢見乎射之豕乃人立而啼公懼墜于車傷足而還其臣連稱管至甫二人作亂遂殺襄公焉吳王夫差殺其臣公孫聖而不以罪後越伐吳吳敗走謂太宰嚭曰吾前殺臣公孫聖投于餘杭山之下令道當由之吾上畏蒼天下慚于地吾舉足而不進心不忍往子試唱于前若聖猶枉當有應嚭乃向餘杭之山呼曰公孫聖聖即從上應曰枉三呼而三應吳王大懼仰天嘆曰蒼天蒼天寡人豈可復歸乎吳王死不反晉安定張祚以永和中作涼州刺史因自立為涼王河州刺史張璀士衆強盛祚猜忌之密遣兵進圖璀璀率衆拒祚祚遂為璀所殺璀後數見祚來部從鎧甲舉手指璀云底奴要當截汝頭璀入姑臧立張玄靜為涼王自為涼州牧又謀廢玄靜而自王事未遂嘗與玄靜同車出城西門橋梁牢壯而忽摧折刺史舊事正旦放鳥璀所放出手輒死有鸛來巢廣夏門彈逐不去自往看之守燉煌宋混遣弟澄即于巢所害璀璀臨命語澄曰汝荷婚姻而為反逆皇天后土必當照之我自可死當令汝刻我矣混自為尚書令輔政有疾盡日見璀從屋而下奄入柱中其柱狀若火燒掘土則無所見混因病死澄又然燈油變為血廄中馬一夕無尾二歲小兒作老公聲呼曰宋混澄斫汝頭又城東水中出火後三年澄為張雍所殺晉西域校尉張傾以怨殺麴儉臨死有恨言後傾夜見白狗自拔劍斫之不中頃便倒地不起左右見儉枉旁遂以暴卒宋元嘉中李龍等夜行劫掠于時丹陽陶繼之為秣陵縣令微密尋捕遂擒龍等取龍引一人是太樂伎忘其姓名劫發之夜此伎推同伴往就人宿共奏音聲陶不詳審為作款列隨例申上及所宿主人士貴賓客並相明證陶知枉濫但以文書已行不欲自為通塞遂并諸劫千人于郡門斬之此伎聲伎精能又殊辨慧將死之日親鄰知識看者甚衆伎曰我雖賤隸少懷慕善未嘗為非實不作劫陶令已當具知枉見殺害若死無鬼則已有鬼必自陳訴因彈琵琶歌曲而就死衆知其枉莫不殞泣月餘日陶遂夜夢伎來至案前云昔枉見殺實所不忿訴之得理今故取君便入陶口仍落腹中陶即驚寤俄而倒絶狀若風顛良久方醒有時而發輒夭矯頭友著背四日而亡亡後家便貧悴一兒早死餘有一孫窮寒路次宋泰初元年江州刺史鄧琬立刺史晉安王子勛為帝以作亂初南郡太守張悅得罪鎮歸楊都及湓口琬赦之以為冠軍將軍與共經紀軍事琬前軍袁顗既敗張悅懼誅乃稱暴疾伏甲而召鄧琬既至謂之曰卿始此禍而欲賣死少帝乎命斬于床前并殺其子以琬頭至五年悅寢疾見琬為厲遂死宋齊豫章王蕭嶷亡後忽見形于沈文季曰我病未應死皇太子加膏中十一種藥使我不差湯中復加藥一種使我利不斷吾已訴先許還東郕判此事便懷出青𥿄文書示文季云與卿少舊為呈主上也俄而失所枉文季懼不敢傳少時文惠太子薨魏城陽王元徵初為孝莊帝畫計殺爾朱榮及爾朱兆入洛害孝莊而徵懼走投洛陽令寇祖仁祖仁父叔兄弟三人為刺史皆徵之力也既而爾朱兆購徵萬戶侯仁遂斬徽送之并匿其金百斤馬五十匹及兆得徽首亦不賞侯兆乃夢徽曰我金二百斤馬百匹在祖仁家卿可取也兆覺曰城陽家本巨富昨令收捕全無金銀此夢或實至曉即令收祖仁祖仁又見徽曰足得相報矣祖仁款得金百斤馬五十匹兆不信之祖仁私斂戚屬得金三十斤馬三十匹輸兆猶不完數兆乃發怒縣頭于樹以石硾其足鞭捶殺之漢竇嬰字王孫漢孝文帝竇皇后從兄子也封魏其侯為丞相後乃免相及竇皇后崩嬰益疏薄無勢黜不得志與太僕灌夫相引薦交結其歡恨相知之晚孝景帝王皇后異父同母弟田蚡為丞相親幸縱橫使人就嬰來城南田數頃嬰不與曰老僕雖棄丞相雖貴寧可以勢相奪乎灌夫亦助怒之蚡皆恨之及蚡娶妻王太后詔列侯宗室皆往賀蚡灌夫為人狂酒先嘗以醉忤蚡不肯賀之竇嬰強與俱去酒酣灌夫引酒至蚡蚡曰不能滿觴夫因言辭不遜蚡遂怒曰此吾驕灌夫之罪也乃縛夫謂長史曰有詔召宗室而灌夫罵坐不敬奏其在鄉里豪橫處夫棄市竇嬰還謂其妻曰終不令灌夫獨死而嬰獨生乃上事具陳灌夫醉飽事不足誅帝召見之嬰與蚡互相言短長帝問朝臣兩人誰是朝臣多言嬰是王太后聞怒而不食曰我在人皆凌藉吾弟我百歲後當魚肉之及出蚡復為嬰造作惡語用以聞上天子亦以蚡為不直特為太后故論嬰死嬰臨死罵曰若死無知則已有知要不獨死後月餘蚡病一身盡痛若有打擊之者但號呼叩頭謝罪天子使祝鬼者贍之見竇嬰灌夫共手笞蚡蚡遂死天晉大將軍王敦枉害刁玄亮及敦入石頭夢白犬自天下而噬之既還姑熟遇病白日見刁乘軺車道從吏卒來仰頭瞑目乃入攝録敦敦大怖逃不得脫河間國兵張鹿經曠二人相與諧善晉太元十四年五月五日共升鍾嶺坐于山椒鹿酗酒失色拔刀斬曠曠母爾夕夢曠自説為鹿所殺殺尸澗中脫褌覆腹尋覓之時必難可得當令祖飛起以示處也明晨追捕一如所言鹿知事露欲規叛逸出門輒見曠手執雙刀來擬其面遂不得去母具告官鹿以伏辭晉山陰縣令石密先經為御史枉奏殺典客令萬黜密白日見黜來殺密遂死晉大司馬桓溫功業殊盛負其才力久懷篡逆廢晉帝為海西公而立會稽王是為簡文帝太宰武陵王晞性尚武事好犬馬遊獵溫常忍之故加罪狀奏免晞及子綜官又逼新蔡王晃使列晞綜及前著作郎殷涓太宰長史庾清等謀反頻請殺之詔特赦晞父子乃徙新安殺涓父浩先為溫所廢涓頗有氣尚遂不詣溫而與晞遊溫乃疑之庾清坐有才望且宗族甚強所以並致極法簡文尋崩而皇太子立遣詔委政於溫依諸葛亮王導舊事溫大怨望以為失權僭逼愈甚後謁簡文高平陵方欲伏見帝扞墳前輿衣語溫云家國不造委任失所溫答臣不敢臣不敢既登車為左右説之又問殷涓形狀答以肥短溫云向亦見在帝側十餘日便病因此憂悶而死秦姚萇字景茂赤亭羌也父戈仲事石勒石氏既滅萇隨其兄襄與苻永固戰于三原軍敗襄死萇乃降永固即受祿位纍加爵邑及轉龍驤將軍督梁益州諸軍事永固謂之曰朕昔以龍驤建業此號未曾假人今持山南委卿故特以相授其蒙寵任優隆如此後隨永固子睿討慕容泓為泓所敗睿獨死之萇遣長史詣永固謝罪永固怒既甚即戮其使萇益恐懼遂奔西州邀聚士卒而自樹置永固頻為慕容沖所敗沖轉侵逼永固又見妖怪屢起遂走五將山萇即遣驍騎將軍吳中圍永固中執永固以送萇即日囚之以求傳國璽及令禪讓永固不從數以叛逆之罪萇遂殺之遂稱帝後永固尸鞭撻無數裸剝衣裳薦之以棘掘坎埋之及萇遇疾即夢永固將天官使者鬼兵數百突入營中萇甚悚懼走入後帳宮人逆來刺鬼誤中萇陰鬼即相謂曰正著死所拔去矛刃出血石餘忽然驚寤即患陰腫令醫刺之流血如夢又狂言曰殺陛下者臣兄宸耳非臣萇罪願不賜枉後三日萇死秦李雄既王於蜀其弟四子期從叔壽襲期而廢為卭都公尋復殺之而壽自立壽性素凶狠猜忌僕射蔡射等以正直忤旨遂誅之無幾壽病恆見李期蔡射為崇嘔血而死宋高平金鄉張超與同郡翟願不和願以宋元嘉中為方與令忽為人所殺咸疑是超超金鄉後除縣職解宜還家入山筏林翟兄子銅鳥執弓持矢并齎酒醴就山貺之斟酌已畢銅烏曰明府昔害民叔無緣同戴天日引弓射之即死銅烏其夜見超云我不殺汝叔枉見殘害今已上訴故來相報引刀刺之吐血而死宋下邳張稗者家世冠族末葉衰微有孫女姝好美色鄰人求聘為妾稗以舊門之後恥而不與鄰人憤之乃焚其屋稗遂燒死其息邦先行不知後還亦知情狀而畏鄰人之勢又貪其財而不言嫁女與之後經一年邦夢見稗曰汝為兒子逆天不孝棄親就同凶黨捉邦頭以手中桃杖刺之邦因病兩宿嘔血而邦死之日鄰人又見稗排門直入張目攘袂曰君恃貴縱惡酷暴之甚枉見殺害我已上訴事獲申雪卻後數日令君知之鄰人得病尋亦殂沒宋世永康人呂慶祖家甚溫富嘗使一奴名教子守視墅舍以元嘉中便往案行忽為人所殺族弟無期先大舉慶祖餞咸謂為害無期齎羊酒脯至柩所而呪曰君荼酷如此乃云是我魂而有靈使知其既還至三更見慶祖來云近教子畦疇不理訐當痛治奴奴遂以斧斫我背將帽塞口因得嚙奴三指悉皆破碎便取刀刺我曳著後門初見殺時諸從行人亦在其中奴今欲叛我已釘其頭著壁言畢而滅無期早旦以告父母潛視奴所住壁果有一把髮以竹釘之又看其指並見破傷録奴詰驗具伏又云汝既反逆何以不叛奴云頭如被繫欲逃不得諸同見者事事相苻即焚教子并其二息宋高祖平桓玄後以劉毅為撫軍將軍荊州刺史到州便收牛牧寺僧主云藏桓家兒度為沙彌并殺四道人後夜夢見此僧來云君何以枉見殺貧道貧道已白於天帝恐君亦不得久因遂得病不食日爾羸瘦當發楊都時多有諍競侵凌宰輔宋高祖因遣人征之毅敗夜單騎突出投牛牧寺僧白撫軍昔枉殺我師我道人自無執仇之理然何宜來此亡師屢有靈驗云天帝當收撫軍於寺殺之毅便嘆叱出寺後岡上大樹自縊而死也漢世何敞為交址刺史行部到蒼梧郡高要暮宿鵲奔亭夜猶未半有一女子從樓下出自云妾姓蘇名娥字始珠本廣信縣修里人早失父母又無兄弟夫亦久亡有雜繒百二十匹及婢一人名致富妾孤窮羸弱不能自搌欲往旁縣賣繒就同縣人王伯賃車牛一乘直錢萬二千載妾并繒合致富執轡乃以前年四月十日到此亭外于時日暮行人既絶不敢前行因即留止致富暴得腹痛妾往亭長舍乞漿取火亭長龔壽操刀持戟來至車旁問妾曰夫人從何所來車上何載丈夫安在何故獨行妾應之曰何故問之壽因捉妾臂曰少愛有色寧可相樂耶妾時怖懼不肯聽從壽即以刀刺脅一創立死又殺致富壽掘樓下埋妾并婢取財物去殺牛燒車車釭及牛骨貯亭東空井中妾死痛酷無所告訴故來自歸於明使君敞曰今欲發汝尸骸以何為驗女子曰妾上下皆著白衣青絲履猶未朽也掘之果然敞乃遣吏捕壽栲問具服下廣信縣驗問與娥語同收壽父母兄弟皆繫獄敞表壽殺人于常律不至族誅但壽為惡隱密經年王法所不能得鬼神訴千載無一請皆斬之以助陰殺上報德之漢時有王忳字少林為郿縣令之縣到釐亭亭常有鬼殺人忳宿樓上夜有女子稱欲訴冤無衣自蓋忳以衣與之乃進曰妾本涪令妾也欲往之官過此亭宿亭長殺妾大小十餘口埋在樓下奪取衣裳財物亭長今為縣門下遊徼忳曰當為汝報之勿復妄殺良善耶鬼捉衣而去忳旦收遊徼詰問即服收同謀十餘人并殺之掘取諸喪歸其家殯葬亭永清寧人謠曰信哉少林世無偶飛被走馬與鬼語飛被走馬別為他事今所不録宋東海徐某甲前妻許氏生一男名鐵臼而許亡某甲改娶陳氏陳氏凶虐志滅鐵臼陳氏産一男生而呪之曰汝若不除鐵臼非吾子也因名之曰鐵杵欲以杵搗鐵臼也於是捶打鐵臼備諸苦毒飢不給食寒不加絮某甲性暗弱又多不在後妻恣意行其暴酷鐵臼竟以凍餓病杖而死時年十六亡後旬餘鬼忽還家登陳床曰我鐵臼也實無片罪橫見殘害我母訴怨于天今得天曹符來取鐵杵當令鐵杵疾病與我遭苦時同將去自有期日我今停此待之聲如生時家人賓客不見其形皆聞其語于是恆枉屋梁上住陳氏跪謝摶頰為設祭奠鬼云不須如此餓我令死豈是一餐所能對謝陳夜中竊語道之鬼厲聲曰何敢道我令當斷汝屋棟便聞鋸聲屑亦隨落拉然有響如棟實崩舉身走出炳燭照之亦了無異鬼又罵鐵杵曰汝既殺我安坐宅上以為快也當燒汝屋即見火然煙焰大猛內外狼狽俄爾自滅茅茨儼然不見虧損日日罵詈時復歌云桃李花嚴霜落奈何桃李子嚴霜早落已聲甚傷切似是自悼不得長成也于時鐵杵六歲鬼至便病體痛腸大上氣妨食鬼屢打之處處青黯月餘而死鬼便寂然無聞魏司馬宣王功業日隆又誅魏大將軍曹爽篡奪之迹稍彰王陵時為楊州刺史以魏帝制於強臣不堪為主楚王彪年長而有才欲迎立之兗州刺史華歆以陵陰謀白宣王宣王自將中軍討陵掩然卒至陵自知勢窮乃單船出迎宣王宣王送陵還京師陵至城過賈逵廟側陵呼曰賈梁道吾固盡心於魏之社稷惟爾有神知之陵遂飲藥死三族皆誅其年宣王有疾白日見陵來并賈逵為崇因呼字曰彥雲緩我宣王身亦有打處少日遂薨魏支法存亮本是胡人生長廣州妙善醫術遂成巨富有八支毾㲪作百種形像光彩曜日又有沉香八尺板床居常芬馥王談為廣州刺史大兒劭之屢求二物法存不與王談囚存亮繼殺之而籍沒家財焉死後形見于府輒打閣下鼓似若稱冤魂如此經旬月王談得病恆見法存守之少時遂亡劭之至楊都又死宋沮渠蒙遜時有沙門曇摩讖者博達多識為蒙遜之所信重魏氏遣李順拜蒙遜為涼王仍求曇摩讖蒙遜吝而不與摩讖意欲入魏屢從蒙遜請行蒙遜怒殺之既而左右白日見摩讖以劍擊蒙遜因疾而死漢時王濟左右嘗于暗中就婢取濟衣物婢欲姦之其人云不敢婢言若不從我我當大叫此人卒不肯婢遂呼云某甲欲姦我濟即令人殺之此人具自陳訴濟猶不信故牽將去顧謂濟曰枉不可受要當訟府君于天後濟乃病忽見此人語之曰前具告實不見理今便應去濟數日卒漢時遊殷字幼齊漢世為羽林中郎將先與司隸校尉胡軫有隙軫遂誣搆殺之殷死月餘軫得病目精脫但伏罪伏罪遊幼齊將鬼來於是遂死晉富陽縣令王範有妾桃英殊有姿色遂與閣下丁豐史華期二人姦通範嘗出行不還帳內都督孫元弼聞丁豐戶內有環珮聲覘視見桃英與同被而臥元弼叩戶面叱之桃英即起攬裙理鬢躡履還內元弼又見華期帶珮桃英麝香二人懼元弼告之乃共謗元弼與桃英有私範不辨察遂殺元弼有陳超者當時在座勸成元弼罪後範代還超亦出都看範行至赤亭山下值雷雨日暮忽然有人扶超腋徑曳將去入荒澤中電光照見一鬼面甚青黑眼無瞳子曰吾孫元弼也訴怨皇天早見申理連時候汝乃今相遇超叩頭流血鬼曰王範既為事主當先殺之賈景伯孫文度枉太山玄堂下共定死生名録桃英魂魄亦收在女青亭者是第三地獄名枉黃泉下專治女鬼投至天明失鬼所在超至楊都詣範未敢説之便見鬼從外來徑入範帳至夜範始眠忽然大魘連呼不醒家人牽青牛臨範上并加桃人左索向明小蘇十許日而死妾亦暴亡超亦逃走長干寺易姓名為何規後五年三月三日臨水酒酣超云今當不復畏此鬼也低頭便見鬼影已在水中以手撏超鼻血大出可一升許數日而殂晉時張駿據有涼州忌害鎮軍將軍武威鑒以其宗族強大而多功也遂諷其主簿魏篡使誣鑒謀反駿逼鑒自殺後三年篡病見鑒在側遂死晉時羊珊字懿彭祖晉世廬陵太守為人剛克粗暴恃國姻親縱恣尤甚睚眥之嫌輒加刑殺征西大將軍庾亮檻遂具以狀聞有司奏珊殺郡將吏及民蕳良等二百九十人徒譴一百餘人應棄市依八議請宥中宗詔曰此事古今所未有此而可忍孰不可忍何八議之有可獄所賜命珊兄子賁先尚南郡公主自表解婚詔不許琅琊孝王妃山氏珊之甥也苦以為請于是司徒王遵啓珊罪不可容恕宜極重法山太妃感動疾陛下罔極之恩宜蒙生全之宥以是下詔曰山太妃唯此一舅發言摧鯁乃至吐血情慮深重朕丁荼毒受太妃撫育之恩同于慈親若不堪難忍之痛以致頓斃朕亦何顏以寄今便原珊生命以慰太妃渭陽之恩于是除名為民少時疾病恆見蕳良等曰枉豈可受今來相取目申黃泉經宿而死晉時會稽孔基勤學有志操馮結族人孔敝敝使其二子以基為師而敝子並凶猥趣尚不同基屢言之於敝此兒常有忿恚敝尋喪亡服制既除基以宿舊乃齎羊酒往看言子子猶懷宿怨潛遣奴于路側殺基奴還未之至仍見基來張目攘袂厲聲言曰姦醜小豎人面獸心吾蒙顧在尊敦戢平生有何怨惡候道見害慢天忘父神人不容要當斷汝家種從此之後數數見形無幾大兒向廁忽便絶倒絡驛往看已墮于地次者尋復病殂兄弟無後晉時庾亮誅陶稱後咸康五年冬節會文武數十人忽然悉起向階拜揖庾驚問故並云陶公來陶公是稱父侃也庾亦起迎陶公扶兩人悉是舊怨傳詔左右數十人皆操伏戈陶公謂庾曰老僕舉君自代不圖此恩反戮其孤故來相問陶稱何罪身已得訴于帝矣庾不得一言遂寢疾八年一日死
